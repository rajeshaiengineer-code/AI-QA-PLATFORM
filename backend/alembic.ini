# Alembic Configuration File
# https://alembic.sqlalchemy.org/en/latest/

[alembic]
# Path to migration environment
script_location = alembic

# Template for migration files
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d%%(second).2d_%%(slug)s

# Truncate long file names
truncate_slug_length = 40

# Enable timezone-aware revisions
timezone = UTC

# Prepend the current date to migration filenames
prepend_sys_path = .

# SQLAlchemy URL - overridden in env.py
sqlalchemy.url = driver://user:pass@localhost/dbname

# Migration versioning
version_path_separator = os

[post_write_hooks]
# Format migrations with black (optional)
# hooks = black
# black.type = console_scripts
# black.entrypoint = black
# black.options = -l 100 REVISION_SCRIPT_FILENAME

# Logging configuration
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
