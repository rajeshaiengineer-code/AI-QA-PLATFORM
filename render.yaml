# Render Blueprint — one-click public deploy
# https://render.com/docs/blueprint-spec
#
# After first deploy, set frontend NEXT_PUBLIC_API_URL to the backend's
# public URL (https://aiqa-api.onrender.com/api/v1) and redeploy frontend.

databases:
  - name: aiqa-db
    plan: free

services:
  - type: web
    name: aiqa-api
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/v1/health
    envVars:
      # Pin Python — default 3.14 has no pydantic-core wheels (build fails)
      - key: PYTHON_VERSION
        value: "3.12.11"
      - key: ENVIRONMENT
        value: production
      - key: DEBUG
        value: "false"
      - key: LOG_FORMAT
        value: json
      - key: AUTH_ENABLED
        value: "false"
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: aiqa-db
          property: connectionString
      - key: CORS_ORIGINS
        value: https://aiqa-web.onrender.com

  - type: web
    name: aiqa-web
    runtime: node
    plan: free
    rootDir: frontend
    # --include=dev so Tailwind/PostCSS are present even if NODE_ENV=production
    buildCommand: npm ci --include=dev && npm run build
    startCommand: npm run start -- -H 0.0.0.0 -p $PORT
    envVars:
      - key: NODE_ENV
        value: production
      - key: NPM_CONFIG_PRODUCTION
        value: "false"
      # Browser uses same-origin /api/v1; Next proxies to BACKEND_URL
      - key: NEXT_PUBLIC_API_URL
        value: /api/v1
      - key: BACKEND_URL
        value: https://aiqa-api.onrender.com
      - key: NEXT_PUBLIC_DEFAULT_ORGANIZATION_ID
        value: aaaaaaaa-aaaa-4aaa-8aaa-aaaaaaaaaaaa
